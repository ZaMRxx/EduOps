{% extends 'base.html' %}

{% block title %}Email Reset Terkirim - EduOps{% endblock %}

{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height: 78vh;">
    <div class="card border-0 shadow-sm rounded-4" style="max-width: 500px; width: 100%;">
        <div class="card-body p-5 text-center">
            <i class="bi bi-envelope-check text-teal fs-1"></i>
            <h4 class="fw-bold text-dark mt-3">Cek Email Anda</h4>
            <p class="text-secondary font-sm mb-4">Jika email terdaftar, sistem akan mengirim link untuk membuat password baru.</p>
            <a href="{% url 'login' %}" class="btn btn-teal rounded-pill px-4">Kembali ke Login</a>
        </div>
    </div>
</div>
{% endblock %}
